spring.application.name=spring-crud
spring.profiles.active=dev
spring.security.user.name=user
spring.security.user.password=password

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Hikari connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Jackson — global JSON config so DTOs don't need @JsonFormat on every date.
# Note (Jackson 3 / Spring Boot 4): SerializationFeature.WRITE_DATES_AS_TIMESTAMPS
# was removed from SerializationFeature. LocalDate/LocalDateTime serialize as ISO
# strings by default with jsr310 module (auto-registered), so we no longer need
# the explicit property. If a different default is needed in future, configure it
# programmatically via a Jackson3ObjectMapperBuilderCustomizer bean.
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.default-property-inclusion=non_null

# =========================================================================
# Kafka — broker is the docker-compose stack (see docker-compose.yml).
# =========================================================================
# Single host:port for now. In prod this is a comma-separated list of broker
# addresses; the client only needs ONE working broker to discover the rest.
spring.kafka.bootstrap-servers=localhost:9092

# --- Producer ---
# StringSerializer for the key (employee id as String).
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# StringSerializer for value. Why not JsonSerializer:
# the outbox table already stores serialized JSON as a String. The relay sends
# that String AS-IS so consumers see real JSON, not a JSON-encoded JSON string.
# Trade-off: consumers parse JSON manually on receipt (acceptable for our needs).
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# acks=all: leader waits for ALL in-sync replicas to ack before responding.
# Strongest durability. acks=1 = only leader, faster, can lose data on leader
# failure. acks=0 = fire-and-forget, never use for important events.
spring.kafka.producer.acks=all

# Retries + idempotence: prevents duplicates within a single producer session
# if a retry succeeds after a transient broker error. Spring/Kafka turns this
# on by default in modern versions; explicit here so it's visible.
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.retries=10

# --- Consumer ---
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Consumer group id. Members of the same group share partitions; members of
# different groups each get the full stream (pub/sub fan-out).
spring.kafka.consumer.group-id=spring-crud

# Where to start reading when a NEW consumer group has no committed offset:
#   earliest -> from the beginning of the topic
#   latest   -> only messages produced AFTER the consumer connects (default)
# 'earliest' is friendlier in dev so a fresh consumer sees previously-published events.
spring.kafka.consumer.auto-offset-reset=earliest

# (No spring.json.trusted.packages needed — we deserialize as String.)
