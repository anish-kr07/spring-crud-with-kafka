# H2 in-memory datasource (fresh per test run)
spring.datasource.url=jdbc:h2:mem:employeesdb-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Recreate schema each test run for isolation
spring.jpa.hibernate.ddl-auto=create-drop

# H2 console off in tests
spring.h2.console.enabled=false

# Smaller pool — tests don't need 10 connections
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# Quieter logs (override the dev TRACE/DEBUG)
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
