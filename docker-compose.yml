# Local Kafka for spring-crud — single broker, KRaft mode (no Zookeeper).
#
# Image: apache/kafka — the official Apache Software Foundation image.
# (We started with bitnami/kafka but Bitnami restructured their catalog and
# the public 3.7 tag is gone. apache/kafka is the safer long-term choice.)
#
# Env-var convention for apache/kafka: KAFKA_<NAME> (no KAFKA_CFG_ prefix
# that bitnami uses).
#
# Listener strategy:
#   - PLAINTEXT://:9092   exposed to host -> Spring app connects via localhost:9092
#   - INTERNAL://:9094    container network -> Kafka UI connects via kafka:9094
#   - CONTROLLER://:9093  internal-only, used by KRaft for quorum
# advertised.listeners is what clients are TOLD to connect to.

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: spring-crud-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # Listeners
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,INTERNAL://kafka:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

      # Single-node defaults (these must be 1 for one broker)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

      # Auto-create topics in dev. Disable in prod.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: spring-crud-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      # Container-to-container: use service name + INTERNAL port.
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9094"
    depends_on:
      - kafka
